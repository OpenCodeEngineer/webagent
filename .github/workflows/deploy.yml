name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="/opt/webagent"
            cd "${APP_DIR}"

            echo "→ Pulling latest code..."
            git pull origin main
            git checkout -- openclaw/config/openclaw.json5 2>/dev/null || true

            echo "→ Fixing permissions..."
            chown -R openclaw:openclaw . 2>/dev/null || true

            echo "→ Aligning gateway auth token..."
            python3 - <<'PY'
            import hashlib
            import re
            import subprocess
            from pathlib import Path

            env_path = Path("/opt/webagent/.env")
            if not env_path.exists():
                raise SystemExit(0)

            raw_lines = env_path.read_text(encoding="utf-8").splitlines()
            pairs = []
            for line in raw_lines:
                stripped = line.strip()
                if not stripped or stripped.startswith("#") or "=" not in line:
                    continue
                key, value = line.split("=", 1)
                pairs.append((key.strip(), value))
            env_map = {key: value.strip() for key, value in pairs if value.strip()}

            def fingerprint(value):
                if not value:
                    return "none"
                return hashlib.sha256(value.encode("utf-8")).hexdigest()[:12]

            def read_env_value_from_service(service, key):
                try:
                    pid = subprocess.check_output(
                        ["systemctl", "show", "-p", "MainPID", "--value", service],
                        text=True,
                    ).strip()
                    if not pid or pid == "0":
                        return None
                    raw = Path(f"/proc/{pid}/environ").read_bytes()
                    for chunk in raw.split(b"\x00"):
                        prefix = f"{key}=".encode("utf-8")
                        if chunk.startswith(prefix):
                            token = chunk.split(b"=", 1)[1].decode("utf-8", "ignore").strip()
                            return token or None
                except Exception:
                    return None
                return None

            def extract_token_in_block(raw, block_name):
                match = re.search(
                    rf"""["']?{block_name}["']?\s*:\s*\{{[\s\S]*?["']?token["']?\s*:\s*['"]([^'"]+)['"]""",
                    raw,
                    re.MULTILINE,
                )
                if not match:
                    return None
                value = match.group(1).strip()
                return value or None

            running_gateway_token = read_env_value_from_service("openclaw-gateway", "OPENCLAW_GATEWAY_TOKEN")
            running_proxy_token = read_env_value_from_service("webagent-proxy", "OPENCLAW_GATEWAY_TOKEN")

            token = (
                env_map.get("PROXY_CUSTOMER_API_TOKEN")
                or env_map.get("PROXY_API_TOKEN")
                or env_map.get("OPENCLAW_HOOKS_TOKEN")
                or env_map.get("OPENCLAW_GATEWAY_TOKEN")
                or running_gateway_token
            )

            if not token:
                raise SystemExit(0)

            print(
                "Token fingerprints before align:",
                f"selected={fingerprint(token)}",
                f"proxy_customer={fingerprint(env_map.get('PROXY_CUSTOMER_API_TOKEN'))}",
                f"proxy_api={fingerprint(env_map.get('PROXY_API_TOKEN'))}",
                f"hooks_env={fingerprint(env_map.get('OPENCLAW_HOOKS_TOKEN'))}",
                f"gateway_env={fingerprint(env_map.get('OPENCLAW_GATEWAY_TOKEN'))}",
                f"running_gateway={fingerprint(running_gateway_token)}",
                f"running_proxy={fingerprint(running_proxy_token)}",
            )

            cfg_env_path = "/opt/webagent/openclaw/config/openclaw.json5"
            updated = list(raw_lines)
            replaced_gateway = False
            replaced_cfg_path = False
            next_lines = []
            for line in updated:
                if line.startswith("OPENCLAW_GATEWAY_TOKEN="):
                    next_lines.append(f"OPENCLAW_GATEWAY_TOKEN={token}")
                    replaced_gateway = True
                elif line.startswith("OPENCLAW_CONFIG_PATH="):
                    next_lines.append(f"OPENCLAW_CONFIG_PATH={cfg_env_path}")
                    replaced_cfg_path = True
                else:
                    next_lines.append(line)
            if not replaced_gateway:
                if next_lines and next_lines[-1].strip():
                    next_lines.append("")
                next_lines.append(f"OPENCLAW_GATEWAY_TOKEN={token}")
            if not replaced_cfg_path:
                next_lines.append(f"OPENCLAW_CONFIG_PATH={cfg_env_path}")
            updated = next_lines

            env_path.write_text("\n".join(updated) + "\n", encoding="utf-8")
            hooks_token = token

            cfg_path = Path("/opt/webagent/openclaw/config/openclaw.json5")
            if cfg_path.exists():
                raw = cfg_path.read_text(encoding="utf-8")
                print(
                    "Config presence flags:",
                    f"has_gateway={bool(re.search(r'''[\"']?gateway[\"']?\\s*:''', raw))}",
                    f"has_auth={bool(re.search(r'''[\"']?auth[\"']?\\s*:''', raw))}",
                    f"has_remote={bool(re.search(r'''[\"']?remote[\"']?\\s*:''', raw))}",
                    f"has_hooks={bool(re.search(r'''[\"']?hooks[\"']?\\s*:''', raw))}",
                )
                next_raw = raw
                next_raw = re.sub(
                    r"""(["']?auth["']?\s*:\s*\{[\s\S]*?["']?token["']?\s*:\s*)['"][^'"]*['"]""",
                    rf'\1"{token}"',
                    next_raw,
                    count=1,
                )
                next_raw = re.sub(
                    r"""(["']?remote["']?\s*:\s*\{[\s\S]*?["']?token["']?\s*:\s*)['"][^'"]*['"]""",
                    rf'\1"{token}"',
                    next_raw,
                    count=1,
                )
                next_raw = re.sub(
                    r"""(["']?hooks["']?\s*:\s*\{[\s\S]*?["']?token["']?\s*:\s*)['"][^'"]*['"]""",
                    rf'\1"{hooks_token}"',
                    next_raw,
                    count=1,
                )
                if next_raw != raw:
                    cfg_path.write_text(next_raw, encoding="utf-8")

                print(
                    "Token fingerprints after align:",
                    f"env_gateway={fingerprint(token)}",
                    f"config_auth={fingerprint(extract_token_in_block(next_raw, 'auth'))}",
                    f"config_remote={fingerprint(extract_token_in_block(next_raw, 'remote'))}",
                    f"config_hooks={fingerprint(extract_token_in_block(next_raw, 'hooks'))}",
                )
            PY

            echo "→ Installing dependencies..."
            sudo -u openclaw bash -c "cd ${APP_DIR} && CI=1 pnpm install --frozen-lockfile --prod=false --force"

            echo "→ Building all packages..."
            sudo -u openclaw bash -c "cd ${APP_DIR} && pnpm build"

            echo "→ Copying Next.js static assets to standalone..."
            cp -r "${APP_DIR}/packages/admin/.next/static" \
                  "${APP_DIR}/packages/admin/.next/standalone/packages/admin/.next/static"

            echo "→ Running database migrations..."
            sudo -u openclaw bash -c "cd ${APP_DIR} && pnpm --filter @webagent/proxy db:migrate" || true

            echo "→ Restarting services..."
            # Stop gateway cleanly first, then force-kill any stale process on port
            systemctl stop openclaw-gateway 2>/dev/null || true
            sleep 1
            lsof -ti :18789 2>/dev/null | xargs kill -9 2>/dev/null || true
            sleep 2
            systemctl start openclaw-gateway
            systemctl restart webagent-proxy
            systemctl restart webagent-admin
            sleep 3

            echo "→ Health checks..."
            curl -sf http://127.0.0.1:3001/health || (echo "PROXY HEALTH FAILED" && exit 1)
            curl -sf http://127.0.0.1:3000/ -o /dev/null || (echo "ADMIN HEALTH FAILED" && exit 1)
            OPENCLAW_HEALTH=""
            for _ in $(seq 1 30); do
              OPENCLAW_HEALTH=$(curl -sf http://127.0.0.1:3001/health/openclaw || true)
              if echo "$OPENCLAW_HEALTH" | grep -q '"ok"'; then
                break
              fi
              sleep 2
            done
            echo "$OPENCLAW_HEALTH"
            if ! echo "$OPENCLAW_HEALTH" | grep -q '"ok"'; then
              echo "OPENCLAW HEALTH FAILED"
              GATEWAY_URL_LINE=$(grep -E '^OPENCLAW_GATEWAY_URL=' "${APP_DIR}/.env" || true)
              if [ -n "$GATEWAY_URL_LINE" ]; then
                echo "Configured OPENCLAW_GATEWAY_URL: ${GATEWAY_URL_LINE#OPENCLAW_GATEWAY_URL=}"
              fi
              GATEWAY_TOKEN=$(grep -E '^OPENCLAW_GATEWAY_TOKEN=' "${APP_DIR}/.env" | head -1 | cut -d= -f2- || true)
              HOOKS_TOKEN=$(grep -E '^OPENCLAW_HOOKS_TOKEN=' "${APP_DIR}/.env" | head -1 | cut -d= -f2- || true)
              for LABEL in gateway hooks; do
                TOKEN=""
                if [ "$LABEL" = "gateway" ]; then
                  TOKEN="$GATEWAY_TOKEN"
                else
                  TOKEN="$HOOKS_TOKEN"
                fi
                if [ -z "$TOKEN" ]; then
                  continue
                fi
                PROBE_FILE="/tmp/openclaw-hook-probe-${LABEL}.json"
                STATUS=$(curl -s -o "$PROBE_FILE" -w "%{http_code}" \
                  -X POST "http://127.0.0.1:18789/hooks/wake" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"text":"health-check","mode":"next-heartbeat"}' || true)
                echo "hooks/wake probe (${LABEL} token): HTTP ${STATUS}"
                if [ -s "$PROBE_FILE" ]; then
                  cat "$PROBE_FILE"
                  echo
                fi
              done
              systemctl --no-pager --full status openclaw-gateway || true
              journalctl -u openclaw-gateway --since "-3 min" --no-pager || true
              exit 1
            fi

            echo "→ Meta-agent WS smoke check..."
            CUSTOMER_TOKEN=$(grep -E '^PROXY_CUSTOMER_API_TOKEN=' "${APP_DIR}/.env" | head -1 | cut -d= -f2- || true)
            if [ -z "$CUSTOMER_TOKEN" ]; then
              CUSTOMER_TOKEN=$(grep -E '^PROXY_API_TOKEN=' "${APP_DIR}/.env" | head -1 | cut -d= -f2- || true)
            fi
            if [ -z "$CUSTOMER_TOKEN" ]; then
              CUSTOMER_TOKEN=$(grep -E '^OPENCLAW_GATEWAY_TOKEN=' "${APP_DIR}/.env" | head -1 | cut -d= -f2- || true)
            fi
            if [ -n "$CUSTOMER_TOKEN" ]; then
              SMOKE_RESP=$(curl -sS -X POST \
                "http://127.0.0.1:3001/api/agents/create-via-meta?customerId=00000000-0000-4000-8000-000000000001" \
                -H "Authorization: Bearer ${CUSTOMER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"messages":[{"role":"user","content":"Health check: reply READY in one short sentence."}]}' || true)
              echo "$SMOKE_RESP"
              if ! printf '%s' "$SMOKE_RESP" | python3 - <<'PY'
            import json
            import sys

            raw = sys.stdin.read()
            try:
                payload = json.loads(raw)
            except Exception:
                raise SystemExit(2)

            if isinstance(payload, dict) and payload.get("error"):
                raise SystemExit(1)

            data = payload.get("data") if isinstance(payload, dict) else None
            response = data.get("response") if isinstance(data, dict) else None
            if not isinstance(response, str) or not response.strip():
                raise SystemExit(1)

            if "gateway token mismatch" in response.lower():
                raise SystemExit(1)
            PY
              then
                echo "META AGENT WS SMOKE FAILED"
                systemctl --no-pager --full status webagent-proxy || true
                journalctl -u webagent-proxy --since "-3 min" --no-pager || true
                systemctl --no-pager --full status openclaw-gateway || true
                journalctl -u openclaw-gateway --since "-3 min" --no-pager || true
                exit 1
              fi
            else
              echo "META AGENT WS SMOKE SKIPPED (no API token found)"
            fi

            echo "→ Static asset check..."
            CSS_PATH=$(curl -s http://127.0.0.1:3000/login | grep -oE '_next/static/css/[^"]+' | head -1)
            if [ -n "$CSS_PATH" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3000/$CSS_PATH")
              if [ "$STATUS" != "200" ]; then
                echo "CSS ASSET FAILED: $CSS_PATH returned $STATUS"
                exit 1
              fi
            fi

            echo "→ OAuth provider check..."
            PROVIDERS=$(curl -s http://127.0.0.1:3000/api/auth/providers)
            echo "$PROVIDERS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'google' in d and 'credentials' in d" \
              || (echo "OAUTH PROVIDERS CHECK FAILED" && exit 1)

            echo "✅ Deploy successful"
