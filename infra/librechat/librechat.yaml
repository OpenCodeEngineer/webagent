version: 1.3.9
cache: true

# Disable all default providers — we only use our custom endpoint
endpoints:
  openAI:
    disabled: true
  anthropic:
    disabled: true
  google:
    disabled: true
  assistants:
    disabled: true
  custom:
    - name: "Lamoom Agent Builder"
      apiKey: "${LIBRECHAT_API_KEY}"
      baseURL: "http://host.docker.internal:3001/v1"
      models:
        default:
          - "meta-agent"
        fetch: true
      titleConvo: true
      titleModel: "meta-agent"
      modelDisplayLabel: "Lamoom"
      iconURL: "https://dev.lamoom.com/favicon.ico"
      dropParams:
        - stop
        - frequency_penalty
        - presence_penalty
        - top_p
        - temperature
