version: 1.3.9
cache: true

# ── Disable all built-in providers ──
endpoints:
  openAI:
    disabled: true
  anthropic:
    disabled: true
  google:
    disabled: true
  assistants:
    disabled: true
  agents:
    disabled: true
  custom:
    - name: "Lamoom Agent Builder"
      apiKey: "${LIBRECHAT_API_KEY}"
      baseURL: "http://host.docker.internal:3001/v1"
      models:
        default:
          - "meta-agent"
        fetch: true
      titleConvo: true
      titleModel: "meta-agent"
      modelDisplayLabel: "Lamoom"
      iconURL: "https://dev.lamoom.com/favicon.ico"
      dropParams:
        - stop
        - frequency_penalty
        - presence_penalty
        - top_p
        - temperature

# ── Strip UI to bare chat ──
# Users only need the conversation — hide everything else
interface:
  modelSelect: false
  parameters: false
  presets: false
  prompts: false
  bookmarks: false
  memories: false
  multiConvo: false
  agents: false
  temporaryChat: false
  runCode: false
  webSearch: false
  fileSearch: false
  fileCitations: false
  peoplePicker:
    use: false
  marketplace:
    use: false
  mcpServers:
    use: false
    create: false
