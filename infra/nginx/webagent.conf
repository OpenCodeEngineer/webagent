# Nginx reverse-proxy for webagent
# TLS certs are managed by certbot under /etc/letsencrypt/live/${DOMAIN}

upstream admin_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream proxy_upstream {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Common proxy headers ────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── WebSocket upgrade (/ws) ─────────────────────────────────────────────
    location /ws {
        proxy_pass http://proxy_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    # ── OpenAI-compat routes (/v1/) ─────────────────────────────────────────
    location /v1/ {
        proxy_pass http://proxy_upstream;
    }

    # ── Widget bundle (/widget.js) ──────────────────────────────────────────
    location = /widget.js {
        proxy_pass http://proxy_upstream;
    }

    # ── Health check (/health) ──────────────────────────────────────────────
    location = /health {
        proxy_pass http://proxy_upstream;
    }

    location ^~ /health/ {
        proxy_pass http://proxy_upstream;
    }

    # ── Admin UI (catch-all → Next.js) ──────────────────────────────────────
    location / {
        proxy_pass http://admin_upstream;
    }
}
