# Nginx reverse-proxy for webagent
# Replace ${DOMAIN} or let setup.sh substitute it at deploy time.
# Certbot will append/manage the SSL block automatically.

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=widget_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

upstream admin_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream proxy_upstream {
    server 127.0.0.1:3001;
    keepalive 64;
}

# ── HTTP → HTTPS redirect (certbot manages this block) ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # Certbot will replace these paths after running
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Common proxy headers (shared map) ────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── WebSocket upgrade (/ws) ───────────────────────────────────────────────
    location /ws {
        proxy_pass http://proxy_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;

        # Limit concurrent WS connections per IP
        limit_conn ws_conn 20;
    }

    # ── REST API (/api) ───────────────────────────────────────────────────────
    # NextAuth endpoints are served by the Next.js admin app, not proxy.
    # Keep this block above /api so auth routes do not get forwarded to proxy.
    location ^~ /api/auth/ {
        proxy_pass http://admin_upstream;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;

        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
    }

    location /api {
        proxy_pass http://proxy_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;

        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
    }

    # ── Proxy health check (/health) ─────────────────────────────────────────
    location = /health {
        proxy_pass http://proxy_upstream;
    }

    # ── OpenAI-compat routes (/v1/) ──────────────────────────────────────────
    location /v1/ {
        proxy_pass http://proxy_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;

        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
    }

    # ── Widget bundle (/widget.js) ────────────────────────────────────────────
    location = /widget.js {
        proxy_pass http://proxy_upstream;
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";

        limit_req zone=widget_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # ── SSO / identity routes (/sso/) ────────────────────────────────────────
    location /sso/ {
        proxy_pass http://proxy_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;

        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
    }

    # ── Admin UI (catch-all) ──────────────────────────────────────────────────
    # Admin UI - allow localhost (for OpenClaw gateway web fetch)
    location / {
        allow 127.0.0.1;
        proxy_pass http://admin_upstream;
        proxy_read_timeout 60s;
    }
}
