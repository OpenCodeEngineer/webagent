# Nginx reverse-proxy for webagent
# TLS certs managed by certbot under /etc/letsencrypt/live/${DOMAIN}
# HTTP served directly (no redirect) to support dev environments with self-signed certs

upstream admin_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream proxy_upstream {
    server 127.0.0.1:3001;
    keepalive 64;
}

# ── Common location blocks (shared via include-style macro) ────────────────────
# (duplicated below for HTTP + HTTPS blocks since nginx doesn't support macros)

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    location /ws {
        proxy_pass http://proxy_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    location /v1/ { proxy_pass http://proxy_upstream; }
    location = /widget.js { proxy_pass http://proxy_upstream; }
    location = /health { proxy_pass http://proxy_upstream; }
    location ^~ /health/ { proxy_pass http://proxy_upstream; }

    location /_next/static/ {
        alias /opt/webagent/packages/admin/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location = /api/agents/create-via-meta {
        proxy_pass         http://admin_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / { proxy_pass http://admin_upstream; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    location /ws {
        proxy_pass http://proxy_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    location /v1/ { proxy_pass http://proxy_upstream; }
    location = /widget.js { proxy_pass http://proxy_upstream; }
    location = /health { proxy_pass http://proxy_upstream; }
    location ^~ /health/ { proxy_pass http://proxy_upstream; }

    location /_next/static/ {
        alias /opt/webagent/packages/admin/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location = /api/agents/create-via-meta {
        proxy_pass         http://admin_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / { proxy_pass http://admin_upstream; }
}
