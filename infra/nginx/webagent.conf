# Nginx reverse-proxy for webagent
# Replace ${DOMAIN} or let setup.sh substitute it at deploy time.
# Certbot will append/manage the SSL block automatically.

upstream admin_upstream {
    server 127.0.0.1:3000;
}

upstream proxy_upstream {
    server 127.0.0.1:3001;
}

# ── HTTP → HTTPS redirect (certbot manages this block) ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ${DOMAIN};

    # Certbot will replace these paths after running
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── WebSocket upgrade (/ws) ───────────────────────────────────────────────
    location /ws {
        proxy_pass http://proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API (/api) ───────────────────────────────────────────────────────
    location /api {
        proxy_pass http://proxy_upstream;
        proxy_read_timeout 60s;
    }

    # ── Widget bundle (/widget.js) ────────────────────────────────────────────
    location = /widget.js {
        proxy_pass http://proxy_upstream;
        add_header Cache-Control "public, max-age=300";
    }

    # ── Admin UI (catch-all) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://admin_upstream;
        proxy_read_timeout 60s;
    }
}
